<div class="list">
  @for (story of publishedStories(); track story.id) {
    <button type="button"
            class="story-row"
            [class.selected]="story.id === selectedId()"
            (click)="select.emit(story.id)">
      <span class="row-title">{{ story.title }}</span>
      <span class="row-meta">{{ story.lastModified }} ♡ {{ story.likes }}</span>
    </button>
  } @empty {
    <div class="empty-state">
      <p>Aucune histoire publiée pour le moment.</p>
    </div>
  }
</div>
