@if (vaultCategories.breadcrumb().length > 0) {
  <nav class="breadcrumb">
    <span class="prefix">//</span>
    @for (seg of vaultCategories.breadcrumb(); track seg.label; let last = $last) {
      <button
        type="button"
        class="segment"
        [class.is-current]="seg.isCurrent"
        [disabled]="seg.isCurrent"
        (click)="vaultCategories.navigateSegment(seg)">
        {{ seg.label }}
      </button>
      @if (!last) {
        <span class="separator">/</span>
      }
    }
  </nav>
}

<div class="content-container">

  <div class="marsball-grid">
    @for (category of categories(); track category.id) {
      <div class="category-card" 
           [class.selected]="isSelected(category.id)"
           (click)="onCardClick(category)">
        <div class="card">
          <span class="category-title">{{ category.title }}</span>
          
          @if (isAdmin()) {
          <button 
            class="delete-cross" 
            [class.active]="isSelected(category.id)"
            (click)="$event.stopPropagation(); toggleSelection(category.id)">
            ✕
          </button>
          }
        </div>
      </div>
    }
  </div>

</div>
