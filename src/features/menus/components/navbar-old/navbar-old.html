<nav class="navbar-container" [ngClass]="{
  'collapsed': !openMenu(),
  'expanded': openMenu()
}">
  <a routerLink="/accueil" class="logo" (click)="onClick()">
    <img src="assets/images/logo/Logo.png" alt="L'Antre">
  </a>

  <button class="menu-toggle"
          [ngClass]="{
            'expanded': openMenu(),
            'collapsed': !openMenu()
          }"
          (click)="toggleMenu()">
    <span class="hamburger-icon">☰</span>
    MENU
  </button>

  <div class="menu-content">
    <div class="search-container">
      <app-searchbar></app-searchbar>
    </div>

    <a routerLink="/archives" routerLinkActive="active" class="menu-btn" (click)="onClick()">
      Archives
    </a>
    <a routerLink="/marsball" routerLinkActive="active" class="menu-btn" (click)="onClick()">
      Marsball
    </a>
    <a routerLink="/terraformars" routerLinkActive="active" class="menu-btn" (click)="onClick()">
      Terraformars
    </a>
    <a routerLink="/chroniques" routerLinkActive="active" class="menu-btn" (click)="onClick()">
      Chroniques de Mars
    </a>
  </div>

  <div class="tesla-separator">
    <img class="triode triode-left"  src="/assets/images/vrac/triode.png" alt="">

    <div class="arc-zone">
      <svg viewBox="0 0 1500 300" preserveAspectRatio="none">
        <defs>
          <filter id="nav-t1" filterUnits="userSpaceOnUse" x="-150" y="-100" width="1800" height="500">
            <feTurbulence type="fractalNoise" baseFrequency="0.005 0.018" numOctaves="2" seed="1" result="n">
              <animate attributeName="baseFrequency" values="0.005 0.018;0.009 0.026;0.005 0.018" dur="4.2s" repeatCount="indefinite"/>
              <animate attributeName="seed" values="1;7;19;31;5;1" dur="3.0s" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="45"/>
          </filter>
          <filter id="nav-t2" filterUnits="userSpaceOnUse" x="-150" y="-100" width="1800" height="500">
            <feTurbulence type="fractalNoise" baseFrequency="0.012 0.030" numOctaves="3" seed="3" result="n">
              <animate attributeName="baseFrequency" values="0.012 0.030;0.018 0.040;0.012 0.030" dur="2.8s" repeatCount="indefinite"/>
              <animate attributeName="seed" values="3;17;29;41;13;3" dur="1.5s" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="28"/>
          </filter>
          <filter id="nav-t3" filterUnits="userSpaceOnUse" x="-150" y="-100" width="1800" height="500">
            <feTurbulence type="fractalNoise" baseFrequency="0.020 0.050" numOctaves="3" seed="13" result="n">
              <animate attributeName="baseFrequency" values="0.020 0.050;0.028 0.065;0.020 0.050" dur="1.8s" repeatCount="indefinite"/>
              <animate attributeName="seed" values="13;27;39;53;19;13" dur="0.8s" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="18"/>
          </filter>
          <filter id="nav-t4" filterUnits="userSpaceOnUse" x="-150" y="-100" width="1800" height="500">
            <feTurbulence type="fractalNoise" baseFrequency="0.040 0.085" numOctaves="3" seed="7" result="n">
              <animate attributeName="baseFrequency" values="0.040 0.085;0.052 0.110;0.040 0.085" dur="0.9s" repeatCount="indefinite"/>
              <animate attributeName="seed" values="7;25;43;61;15;7" dur="0.22s" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="10"/>
          </filter>
          <filter id="nav-t5" filterUnits="userSpaceOnUse" x="-150" y="-100" width="1800" height="500">
            <feTurbulence type="fractalNoise" baseFrequency="0.070 0.160" numOctaves="2" seed="9" result="n">
              <animate attributeName="seed" values="9;25;43;67;15;9" dur="0.12s" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="5"/>
          </filter>
        </defs>

        <g>
          <path class="arc-faint" filter="url(#nav-t1)">
            <animate attributeName="d" dur="5.2s" repeatCount="indefinite"
              values="M -100 150 C 250 100 500 195 750 110 S 1250 180 1600 150;
                      M -100 150 C 250 195 500 105 750 190 S 1250 110 1600 150;
                      M -100 150 C 250 115 500 195 750 110 S 1250 195 1600 150;
                      M -100 150 C 250 180 500 110 750 195 S 1250 110 1600 150;
                      M -100 150 C 250 100 500 195 750 110 S 1250 180 1600 150"/>
          </path>
          <path class="arc-faint arc-flick-a" filter="url(#nav-t2)">
            <animate attributeName="d" dur="5.2s" repeatCount="indefinite" begin="0.6s"
              values="M -100 150 C 250 100 500 195 750 110 S 1250 180 1600 150;
                      M -100 150 C 250 195 500 105 750 190 S 1250 110 1600 150;
                      M -100 150 C 250 115 500 195 750 110 S 1250 195 1600 150;
                      M -100 150 C 250 180 500 110 750 195 S 1250 110 1600 150;
                      M -100 150 C 250 100 500 195 750 110 S 1250 180 1600 150"/>
          </path>
        </g>
        <g>
          <path class="arc-dim arc-flick-b" filter="url(#nav-t1)">
            <animate attributeName="d" dur="4.4s" repeatCount="indefinite"
              values="M -100 150 C 300 185 600 115 900 175 S 1300 120 1600 150;
                      M -100 150 C 300 115 600 185 900 120 S 1300 180 1600 150;
                      M -100 150 C 300 175 600 125 900 170 S 1300 125 1600 150;
                      M -100 150 C 300 125 600 175 900 130 S 1300 170 1600 150;
                      M -100 150 C 300 185 600 115 900 175 S 1300 120 1600 150"/>
          </path>
          <path class="arc-dim arc-flick-c" filter="url(#nav-t2)">
            <animate attributeName="d" dur="4.4s" repeatCount="indefinite" begin="0.8s"
              values="M -100 150 C 300 185 600 115 900 175 S 1300 120 1600 150;
                      M -100 150 C 300 115 600 185 900 120 S 1300 180 1600 150;
                      M -100 150 C 300 175 600 125 900 170 S 1300 125 1600 150;
                      M -100 150 C 300 125 600 175 900 130 S 1300 170 1600 150;
                      M -100 150 C 300 185 600 115 900 175 S 1300 120 1600 150"/>
          </path>
        </g>
        <g>
          <path class="arc-mid arc-flick-a" filter="url(#nav-t2)">
            <animate attributeName="d" dur="3.4s" repeatCount="indefinite"
              values="M -100 150 C 350 135 700 165 1050 135 S 1400 150 1600 150;
                      M -100 150 C 350 165 700 135 1050 165 S 1400 150 1600 150;
                      M -100 150 C 350 140 700 162 1050 138 S 1400 150 1600 150;
                      M -100 150 C 350 160 700 138 1050 162 S 1400 150 1600 150;
                      M -100 150 C 350 135 700 165 1050 135 S 1400 150 1600 150"/>
          </path>
          <path class="arc-mid arc-flick-d" filter="url(#nav-t3)">
            <animate attributeName="d" dur="3.4s" repeatCount="indefinite" begin="0.4s"
              values="M -100 150 C 350 145 700 158 1050 140 S 1400 150 1600 150;
                      M -100 150 C 350 158 700 142 1050 160 S 1400 150 1600 150;
                      M -100 150 C 350 138 700 162 1050 138 S 1400 150 1600 150;
                      M -100 150 C 350 162 700 140 1050 160 S 1400 150 1600 150;
                      M -100 150 C 350 145 700 158 1050 140 S 1400 150 1600 150"/>
          </path>
        </g>
        <g>
          <path class="arc-bright arc-flick-b" filter="url(#nav-t3)">
            <animate attributeName="d" dur="2.6s" repeatCount="indefinite"
              values="M -100 150 C 400 148 800 153 1200 148 L 1600 150;
                      M -100 150 C 400 153 800 147 1200 153 L 1600 150;
                      M -100 150 C 400 145 800 155 1200 145 L 1600 150;
                      M -100 150 C 400 155 800 145 1200 155 L 1600 150;
                      M -100 150 C 400 148 800 153 1200 148 L 1600 150"/>
          </path>
          <path class="arc-bright arc-flick-c" filter="url(#nav-t4)">
            <animate attributeName="d" dur="2.2s" repeatCount="indefinite" begin="0.3s"
              values="M -100 150 C 450 151 800 149 1150 152 L 1600 150;
                      M -100 150 C 450 149 800 152 1150 148 L 1600 150;
                      M -100 150 C 450 152 800 148 1150 152 L 1600 150;
                      M -100 150 C 450 151 800 149 1150 152 L 1600 150"/>
          </path>
          <path class="arc-bright arc-flick-a" filter="url(#nav-t4)">
            <animate attributeName="d" dur="2.0s" repeatCount="indefinite" begin="0.7s"
              values="M -100 150 C 500 150 900 151 1300 150 L 1600 150;
                      M -100 150 C 500 152 900 148 1300 152 L 1600 150;
                      M -100 150 C 500 148 900 152 1300 148 L 1600 150;
                      M -100 150 C 500 150 900 151 1300 150 L 1600 150"/>
          </path>
        </g>
        <g>
          <path class="arc-hot" filter="url(#nav-t5)" d="M -100 150 L 1600 150"/>
          <path class="arc-hot arc-flick-d" filter="url(#nav-t5)" d="M -100 150 L 1600 150"/>
          <path class="arc-hot arc-flick-b" filter="url(#nav-t4)" d="M -100 150 L 1600 150"/>
        </g>
      </svg>
    </div>

    <img class="triode triode-right" src="/assets/images/vrac/triode.png" alt="">
  </div>

  <div class="navbar-footer">
    @if (isLoggedIn()) {
      <button class="avatar-btn" (click)="openAccount()" aria-label="Mon compte">
        <img src="/assets/images/frames/Avatar-Circle.png" class="avatar-frame" alt="">
        <img [src]="avatarUrl()" class="avatar-image" alt="Avatar">
      </button>
    }
  </div>
</nav>
