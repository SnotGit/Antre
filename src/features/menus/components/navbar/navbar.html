<nav class="navbar-container" [ngClass]="{
  'collapsed': !openMenu(),
  'expanded': openMenu()
}">
  <a routerLink="/accueil" class="logo" (click)="onClick()">
    <div class="logo-container">
      <div class="glitch-logo">
        <img src="assets/images/logo/Logo.png" alt="L'Antre Logo">
      </div>
      <div class="scanlines"></div>
      <div class="rolling-bar"></div>
      <div class="noise"></div>
    </div>
  </a>

  <button class="menu-toggle" 
          [ngClass]="{
            'expanded': openMenu(),
            'collapsed': !openMenu()
          }"
          (click)="toggleMenu()">
    <span class="hamburger-icon">☰</span>
    MENU
  </button>

  <div class="menu-content">
    <div class="search-container">
      <app-searchbar></app-searchbar>
    </div>

    <a routerLink="/archives" routerLinkActive="active" class="menu-btn" (click)="onClick()">
      Archives
    </a>
    <a routerLink="/marsball" routerLinkActive="active" class="menu-btn" (click)="onClick()">
      Marsball
    </a>
    <a routerLink="/terraformars" routerLinkActive="active" class="menu-btn" (click)="onClick()">
      Terraformars
    </a>
    <a routerLink="/chroniques" routerLinkActive="active" class="menu-btn" (click)="onClick()">
      Chroniques de Mars
    </a>
  </div>

  <div class="navbar-footer">
    @if (isLoggedIn()) {
      <span class="group-title">> PARAMETRES DU COMPTE</span>
      @if (isAdmin()) {
        <a routerLink="/staff" routerLinkActive="active" class="navbar-btn" (click)="onClick()">
          STAFF
        </a>
      }
      <button class="navbar-btn" (click)="openAccount()">MON COMPTE</button>
      <button class="navbar-btn logout" (click)="logout()">DECONNEXION</button>
    } @else {
      <span class="group-title">> SYSTÈME VERROUILLÉ</span>
      <button class="navbar-btn" (click)="openLogin()">[⚡] CONNEXION</button>
      <button class="navbar-btn" (click)="openRegister()">[👤] INSCRIPTION</button>
    }
  </div>
</nav>
