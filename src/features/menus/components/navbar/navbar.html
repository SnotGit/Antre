<nav class="navlinks">
  <a routerLink="/archives" routerLinkActive="active" class="nav-btn" (click)="filters.reset()">ARCHIVES</a>
  <a routerLink="/marsball" routerLinkActive="active" class="nav-btn" (click)="filters.reset()">MARSBALL</a>
  <a routerLink="/terraformars" routerLinkActive="active" class="nav-btn" (click)="filters.reset()">TERRAFORMARS</a>
  <a routerLink="/chroniques" routerLinkActive="active" class="nav-btn" (click)="filters.reset()">CHRONIQUES</a>
</nav>

<div class="user-zone">
  @if (isLoggedIn()) {
    <button type="button" class="avatar-btn" (click)="toggleMenu($event)">
      <div class="avatar">
        @if (avatarUrl(); as url) {
          <img [src]="url" alt="">
        }
      </div>
    </button>
    @if (menuOpen()) {
      <div class="avatar-menu">
        <a routerLink="/mon-compte" class="menu-item" (click)="closeMenu()">MON COMPTE</a>
        <a [routerLink]="['/chroniques', $safeNavigationMigration(user()?.username), 'mes-chroniques']" class="menu-item" (click)="closeMenu()">MES CHRONIQUES</a>
        @if (isAdmin()) {
          <a routerLink="/staff" class="menu-item" (click)="closeMenu()">STAFF</a>
        }
        <button type="button" class="menu-item" (click)="logout()">DECONNEXION</button>
      </div>
    }
  } @else {
    <a routerLink="/login" class="btn">CONNEXION</a>
  }
</div>
