<div class="container">

  <div class="header">
    <h1 class="title">Mon Compte</h1>
  </div>

  @if (error()) {
    <div class="message error">{{ error() }}</div>
  } @else if (success()) {
    <div class="message success">{{ success() }}</div>
  }

  <div class="content">

    <div class="column profil">
      <h2 class="subtitle">Profil</h2>

      <div class="avatar" [style.background-image]="avatarUrl() ? 'url(' + avatarUrl() + ')' : ''"></div>
      <button type="button" class="btn change-avatar" (click)="pickAvatar()">Changer l'avatar</button>

      <input type="text" class="input" [(ngModel)]="username" placeholder="Pseudo" maxlength="50" autocomplete="off" [disabled]="loading()">
      <input type="text" class="input" [(ngModel)]="description" placeholder="Description" maxlength="60" autocomplete="off" [disabled]="loading()">
      <input type="text" class="input" [(ngModel)]="playerId" placeholder="ID Joueur" maxlength="20" autocomplete="off" [disabled]="loading()">
    </div>

    <div class="column credentials">
      <h2 class="subtitle">Identifiants</h2>

      <input type="password" class="input" [(ngModel)]="currentPassword" placeholder="Mot de passe actuel" autocomplete="current-password" [disabled]="loading()">
      <input type="email" class="input" [(ngModel)]="newEmail" placeholder="Nouvel email" [disabled]="loading()">
      <input type="email" class="input" [(ngModel)]="confirmEmail" placeholder="Confirmer l'email" [disabled]="loading()">
      <input type="password" class="input" [(ngModel)]="newPassword" placeholder="Nouveau mot de passe" autocomplete="new-password" [disabled]="loading()">
      <input type="password" class="input" [(ngModel)]="confirmPassword" placeholder="Confirmer le mot de passe" autocomplete="new-password" [disabled]="loading()">
    </div>

  </div>

  <div class="validate">
    <button type="button" class="btn valider" (click)="save()" [disabled]="loading() || !usernameValid()">Valider</button>
  </div>

  <div class="footer">
    <div class="meta">
      <span class="meta-row"><span class="meta-key">Membre depuis :</span> {{ memberSince() }}</span>
      <span class="meta-row"><span class="meta-key">Statut :</span> {{ status() }}</span>
    </div>
    <button type="button" class="btn danger delete" (click)="deleteAccount()" [disabled]="loading()">Supprimer le compte</button>
  </div>

  <input type="file" #fileInput accept="image/*" (change)="onAvatarSelected($event)" hidden>

</div>
