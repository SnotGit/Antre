<nav class="breadcrumb">
  <span class="prefix">//</span>
  @for (seg of segments(); track seg.label; let last = $last) {
    <button
      type="button"
      class="segment"
      [class.is-current]="seg.isCurrent"
      [disabled]="seg.isCurrent"
      (click)="navigate(seg)">
      {{ seg.label }}
    </button>
    @if (!last) {
      <span class="separator">/</span>
    }
  }
</nav>
