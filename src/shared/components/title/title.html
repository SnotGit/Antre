<div class="title-container">
  <h2 
    #titleElement
    class="title" 
    [class.typing]="typing()"
    [style.left.px]="titleLeftPosition()">
    {{ headerTitle() }}
  </h2>

  <div class="title-section">
  </div>

  <div class="back-wrapper">
    @if (showBack()) {
      <button class="btn" (click)="goBack()">Retour</button>
    }
  </div>

 

</div>
