<div class="title-container">
  <h2
    #titleElement
    class="title"
    [class.typing]="typing()"
    [style.left.px]="titleLeftPosition()">
    {{ headerTitle() }}
  </h2>

  @if (showBack()) {
    <div class="back-wrapper">
      <button class="btn" (click)="goBack()">Retour</button>
    </div>
  }
</div>
